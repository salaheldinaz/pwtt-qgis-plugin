<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Radar screen background -->
  <circle cx="32" cy="32" r="27" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Grid crosshair -->
  <line x1="32" y1="5" x2="32" y2="59" stroke="#BFDBFE" stroke-width="1"/>
  <line x1="5" y1="32" x2="59" y2="32" stroke="#BFDBFE" stroke-width="1"/>
  <!-- Range rings -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="32" cy="32" r="19" fill="none" stroke="#BFDBFE" stroke-width="1"/>
  <!-- Radar sweep cone -->
  <path d="M32 32 L46 12 A27 27 0 0 0 32 5 Z" fill="#2563EB" opacity="0.18"/>
  <!-- Sweep line -->
  <line x1="32" y1="32" x2="46" y2="12" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Detection blip (damage detected!) -->
  <circle cx="42" cy="20" r="4.5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="7" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.35"/>
