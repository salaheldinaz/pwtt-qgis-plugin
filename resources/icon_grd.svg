<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Satellite body -->
  <rect x="24" y="6" width="16" height="14" rx="2.5" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>
  <!-- Antenna nub -->
  <circle cx="32" cy="6" r="2" fill="#475569"/>
  <!-- Solar panels -->
  <rect x="4" y="8" width="18" height="10" rx="1.5" fill="#3B82F6" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="42" y="8" width="18" height="10" rx="1.5" fill="#3B82F6" stroke="#2563EB" stroke-width="1.5"/>
  <!-- Panel dividers -->
  <line x1="13" y1="8" x2="13" y2="18" stroke="#1D4ED8" stroke-width="1"/>
  <line x1="51" y1="8" x2="51" y2="18" stroke="#1D4ED8" stroke-width="1"/>
  <!-- Radar beam -->
  <path d="M28 20 L16 50 L48 50 L36 20" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="4 3"/>
  <!-- Ground line -->
  <line x1="10" y1="54" x2="54" y2="54" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Download arrow -->
  <line x1="32" y1="30" x2="32" y2="44" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M26.5 39 L32 44.5 L37.5 39" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
