<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Draw AOI icon: dashed rectangle with crosshair -->
  <rect x="0" y="0" width="64" height="64" rx="8" fill="#16213e"/>
  <!-- Dashed rectangle -->
  <rect x="12" y="14" width="40" height="36" rx="2" fill="none"
        stroke="#e94560" stroke-width="2.5" stroke-dasharray="6 3"/>
  <!-- Corner handles -->
  <rect x="9" y="11" width="6" height="6" fill="#e94560"/>
  <rect x="49" y="11" width="6" height="6" fill="#e94560"/>
  <rect x="9" y="47" width="6" height="6" fill="#e94560"/>
  <rect x="49" y="47" width="6" height="6" fill="#e94560"/>
  <!-- Crosshair -->
  <line x1="32" y1="22" x2="32" y2="42" stroke="#0f3460" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="#0f3460" stroke-width="1.5" opacity="0.6"/>
</svg>
