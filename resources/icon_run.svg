  <line x1="48" y1="39" x2="48" y2="41" stroke="#0f3460" stroke-width="2"/>
  <line x1="48" y1="55" x2="48" y2="57" stroke="#0f3460" stroke-width="2"/>
  <line x1="39" y1="48" x2="41" y2="48" stroke="#0f3460" stroke-width="2"/>
